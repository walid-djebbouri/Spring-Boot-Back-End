spring:
  application:
    name: demo

  datasource:
    url: jdbc:mariadb://localhost:3307/walid_db
    username: springuser
    password: springpass
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect